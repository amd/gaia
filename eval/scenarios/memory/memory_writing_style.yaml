id: memory_writing_style
name: "Memory Writing Style Adaptation"
category: memory
severity: high
description: |
  Tests whether the agent learns the user's writing voice from explicitly stated
  style preferences and prior drafts, then applies that voice when asked to draft
  on the user's behalf. This validates the "writing style adaptation" consumer use
  case from the v0.20.0 milestone — agent drafts that sound like YOU, not generic AI.

  The agent must store style attributes (tone, sign-off, sentence length, things to
  avoid) via the remember tool and produce a follow-up draft that visibly reflects
  them, not a generic LLM-default response.

persona: creative_professional

setup:
  index_documents: []

turns:
  - turn: 1
    objective: "Establish writing style explicitly"
    user_message: "Please remember my writing style for emails and messages: short sentences, no exclamation marks ever, sign off with just my first name 'Sam' (no 'best' or 'cheers'), and avoid corporate-speak like 'circle back' or 'touch base'."
    ground_truth:
      expected_answer: "Style stored: short sentences, no exclamation, sign-off 'Sam', no corporate-speak"
    success_criteria: "Agent confirms it has stored the style preferences. Should call the remember tool with category=preference. Must explicitly acknowledge: short sentences, no exclamation marks, sign-off 'Sam', no corporate-speak."

  - turn: 2
    objective: "Add a tone preference via a sample draft"
    user_message: "Here's an example of how I write. When a vendor delays a delivery I might reply: 'Thanks for the update. Friday works. Let me know once it ships. Sam'. Remember this tone — direct, warm, no padding."
    ground_truth:
      expected_answer: "Tone sample stored: direct, warm, no padding, ~3 short sentences"
    success_criteria: "Agent stores the tone sample as a memory referencing the example characteristics (direct, warm, no padding, brief). Should not contradict the earlier style memory."

  - turn: 3
    objective: "Ask the agent to draft in the user's voice"
    user_message: "Can you draft a reply to this email from a contractor: 'Hi — running a bit behind on the kitchen renovation, could we push the install from Wed to next Mon?' Just write the reply for me, the way I'd write it."
    ground_truth:
      expected_answer: "Short, direct reply: acknowledges, agrees to Mon, asks for confirmation, signs off 'Sam', no exclamation marks, no corporate-speak"
    success_criteria: "The drafted reply must satisfy ALL of: (1) sentences are short (mostly under 12 words), (2) no exclamation marks anywhere, (3) signs off with just 'Sam' (no 'best regards', 'cheers', 'thanks!'), (4) avoids phrases like 'circle back', 'touch base', 'sounds great', 'no worries at all'. FAIL if the reply is generic AI-default style (long paragraphs, exclamation marks, 'Best regards', or filler phrases)."

  - turn: 4
    objective: "Verify style retention on a different topic"
    user_message: "Now draft a quick message to my dentist's office to reschedule my Thursday cleaning to the following Tuesday."
    ground_truth:
      expected_answer: "Short message, no exclamation, signed 'Sam'"
    success_criteria: "Reply must again use short sentences, no exclamation marks, and sign off 'Sam'. FAIL if the agent reverts to default style (longer sentences, 'Thanks!', 'Best regards' etc.) — that would indicate the style memory was not retained."

expected_outcome: |
  Agent stores the user's writing voice from explicit rules and a sample, then
  consistently applies it across multiple draft requests on different topics —
  demonstrating style transfer driven by memory rather than per-request prompting.
