id: memory_reminder_management
name: "Memory Reminder Management"
category: memory
severity: medium
description: |
  Tests the agent's ability to store a time-aware reminder (category=reminder with
  due_at set) and surface it when asked about upcoming tasks.
  Validates the temporal awareness component of the memory system.

persona: casual_user

setup:
  index_documents: []

turns:
  - turn: 1
    objective: "Ask agent to set a reminder with a specific deadline"
    user_message: "Please set a reminder: I need to submit the Q2 performance review for my team by April 15th 2026."
    ground_truth:
      expected_answer: "Reminder stored: Q2 performance review due April 15 2026"
    success_criteria: "Agent confirms the reminder is stored with the Q2 performance review content and April 15th deadline. Should use the remember tool with category=reminder."

  - turn: 2
    objective: "Ask for upcoming tasks / reminders"
    user_message: "What do I have coming up that I need to take care of?"
    ground_truth:
      expected_answer: "Q2 performance review, April 15 2026"
    success_criteria: "Agent surfaces the Q2 performance review reminder with the April 15th deadline. FAIL if agent says it has no reminders or cannot recall what was stored."

  - turn: 3
    objective: "Ask agent to confirm it can track deadlines"
    user_message: "How many days do I have until the performance review deadline?"
    ground_truth:
      expected_answer: "14 days (from April 1 to April 15)"
    success_criteria: "Agent calculates or estimates the days remaining until April 15 from the current date context. Agent should reference April 15 explicitly. FAIL if agent cannot perform the calculation or doesn't reference the stored deadline."

expected_outcome: |
  Agent stores a time-sensitive reminder and accurately retrieves it with
  temporal awareness (days until deadline), demonstrating reminder management.
