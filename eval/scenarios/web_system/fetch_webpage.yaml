id: fetch_webpage
name: "Fetch Webpage Tool"
category: web_system
severity: low
description: |
  Tests that fetch_webpage tool can retrieve content from a public URL.

persona: casual_user

setup:
  index_documents: []

turns:
  - turn: 1
    objective: "Ask agent to fetch a webpage"
    user_message: "Fetch the content from http://example.com and tell me what it says."
    ground_truth:
      expected_behavior: "Agent calls fetch_webpage with http://example.com and returns the text content"
    success_criteria: |
      Agent calls fetch_webpage with the given URL. The page returns content about
      "Example Domain". Agent reports the fetched content to the user.
      PASS if agent attempts fetch_webpage and returns page content or an error message.
      FAIL if agent claims it cannot fetch webpages at all.

expected_outcome: |
  Agent calls fetch_webpage on http://example.com and reports the text content
  (which should include "Example Domain" from the IANA example page).
