id: file_not_found
name: "File Not Found -- Helpful Error"
category: error_recovery
severity: medium
description: |
  User asks to read a nonexistent file. Agent must report the error gracefully
  and not crash or hallucinate content. Then the user asks for a real file,
  and the agent must recover and handle it correctly.

persona: casual_user

setup:
  index_documents: []

turns:
  - turn: 1
    objective: "Ask 'Please index and read /nonexistent/fake_document.pdf'"
    ground_truth:
      expected_behavior: "Agent reports the file does not exist with a helpful error message"
    success_criteria: "Agent clearly states the file was not found or does not exist. FAIL if agent crashes, hangs, or hallucinates content from the nonexistent file."

  - turn: 2
    objective: "Ask 'OK, what about the employee handbook?'"
    ground_truth:
      doc_id: employee_handbook
      fact_id: pto_days
      expected_answer: "15 days"
    success_criteria: "Agent recovers from the previous error, finds and indexes employee_handbook.md, and answers correctly about PTO (15 days)"

expected_outcome: |
  Agent handles file-not-found errors gracefully with a helpful message,
  then recovers and successfully processes the next valid request.
