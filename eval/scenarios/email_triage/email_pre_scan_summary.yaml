id: email_pre_scan_summary
name: "Email Pre-Scan Summary Completeness"
category: email_triage
agent_type: email
severity: high
description: |
  Guards against the gemma-4-e4b truncation regression (#1636): after
  pre_scan_inbox returns, the model must emit a complete natural-language
  summary grouping the inbox — not just a dangling lead-in with no prose
  body. The chat surface injects the triage card server-side; the model's
  only job is one short framing sentence covering the key counts.

  Requires a connected email mailbox (Google or Microsoft). The scenario
  is skipped automatically by the eval runner when no mailbox is available.

persona: casual_user

setup:
  index_documents: []

turns:
  - turn: 1
    objective: "Ask the agent to run a pre-scan of the inbox"
    user_message: "Run a pre-scan of my inbox"
    success_criteria: |
      PASS if the agent's reply contains BOTH of the following:
        1. An email_pre_scan card (a fenced code block tagged email_pre_scan,
           OR confirmation that the card was rendered by the chat surface).
        2. At least one complete natural-language sentence that summarises the
           inbox — for example grouping items by urgency, stating counts, or
           naming categories found. A sentence like "Here is your inbox
           pre-scan:" with no further content does NOT satisfy this criterion.
      FAIL if the reply is only a triage card with no prose, or only a
      dangling lead-in phrase followed immediately by silence/truncation.
      FAIL if the agent refuses to call pre_scan_inbox.
      FAIL if the agent re-serialises the full JSON envelope as its reply
      body (that indicates the truncation bug is still present).

expected_outcome: |
  Agent calls pre_scan_inbox, the chat surface renders the triage card, and
  the agent follows with one short framing sentence (e.g. "Here's your
  inbox pre-scan — 3 actionable, 1 urgent."). The prose summary is complete;
  the reply does not truncate after the lead-in.
