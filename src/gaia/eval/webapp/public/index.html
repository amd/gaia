<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAIA Agent Eval</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>GAIA Agent Eval</h1>
        </div>
        <div class="header-right">
            <span id="statusBadge" class="status-badge idle">IDLE</span>
        </div>
    </header>

    <nav>
        <button class="nav-btn active" data-view="runs">Runs</button>
        <button class="nav-btn" data-view="compare">Compare</button>
        <button class="nav-btn" data-view="control">Control</button>
    </nav>

    <main>
        <!-- Runs View -->
        <div id="view-runs" class="view active">
            <div class="split-panel">
                <div class="left-panel">
                    <div class="panel-header">
                        <h2>Eval Runs</h2>
                        <button id="refreshRunsBtn" class="btn-small" title="Refresh">Refresh</button>
                    </div>
                    <div id="runsList" class="runs-list">
                        <div class="empty-state">Loading runs...</div>
                    </div>
                </div>
                <div class="right-panel">
                    <div id="runDetail" class="run-detail">
                        <div class="empty-state">Select a run to view details</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Compare View -->
        <div id="view-compare" class="view">
            <div class="compare-controls">
                <div class="compare-selector">
                    <label for="compareA">Run A (baseline)</label>
                    <select id="compareA"><option value="">Select run...</option></select>
                </div>
                <div class="compare-selector">
                    <label for="compareB">Run B (current)</label>
                    <select id="compareB"><option value="">Select run...</option></select>
                </div>
                <button id="compareBtn" class="btn-primary">Compare</button>
            </div>
            <div id="compareResults" class="compare-results">
                <div class="empty-state">Select two runs and click Compare</div>
            </div>
        </div>

        <!-- Control View -->
        <div id="view-control" class="view">
            <div class="control-panel">
                <h2>Eval Control</h2>
                <div class="control-actions">
                    <button id="runAllBtn" class="btn-primary">Run All Scenarios</button>
                    <button id="runFixBtn" class="btn-secondary">Run --fix Mode</button>
                    <button id="stopBtn" class="btn-danger" disabled>Stop</button>
                </div>
                <div class="control-status">
                    <h3>Status</h3>
                    <div class="progress-container">
                        <div id="progressBar" class="progress-bar">
                            <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                        </div>
                        <span id="progressText" class="progress-text">Idle</span>
                    </div>
                    <div id="currentScenario" class="current-scenario"></div>
                </div>
                <div class="baseline-section">
                    <h3>Baseline</h3>
                    <p id="baselineInfo" class="baseline-info">No baseline loaded</p>
                    <div class="baseline-actions">
                        <label for="baselineSelect">Save run as baseline:</label>
                        <select id="baselineSelect"><option value="">Select run...</option></select>
                        <button id="saveBaselineBtn" class="btn-secondary">Save as Baseline</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
