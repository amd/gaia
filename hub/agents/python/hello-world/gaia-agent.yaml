    - "amd-gaia[api]>=0.20.0"

requirements:
  min_memory_gb: 5
  platforms: [win-x64, linux-x64, darwin-arm64]

interfaces:
  tui: true
  cli: true
  pipe: true
  api_server: true
  mcp_server: true
