id: email
name: Email Triage
version: 0.4.0
description: "GAIA email triage agent — read, triage, organize, and reply to Gmail/Outlook locally"
author: AMD
license: MIT

# Distributed as an npm client + frozen sidecar (not a PyPI wheel). These drive
# the hub page's install method and the playground launcher.
npm_package: "@amd-gaia/agent-email"
playground_url: "http://127.0.0.1:8131/v1/email/playground"

category: productivity
tags: [email, gmail, calendar, triage]
icon: mail
tools_count: 6

language: python
min_gaia_version: "0.20.0"
models: [Gemma-4-E4B-it-GGUF]

python:
  entry_module: gaia_agent_email
  entry_class: EmailTriageAgent
  dependencies:
    - "amd-gaia>=0.20.0"

requirements:
  min_memory_gb: 8
  platforms: [win-x64, linux-x64, darwin-arm64]

interfaces:
  tui: false
  cli: true
  pipe: true
  api_server: true
  mcp_server: true
