id: chat
name: Chat
version: 0.1.0
description: "GAIA chat agent — conversation, document Q&A (RAG), and file-system profiles"
author: AMD
license: MIT

category: conversation
tags: [chat, general, personality, rag, files]
icon: message-circle
# Real registered-tool count for entry_class's default config (prompt_profile
# defaults to "full") — introspected, drift-guarded by
# tests/unit/test_chat_fix_contracts.py.
tools_count: 54

language: python
min_gaia_version: "0.22.0"
models: []

python:
  entry_module: gaia_agent_chat
  entry_class: ChatAgent
  dependencies:
    - "amd-gaia>=0.22.0"

requirements:
  min_memory_gb: 8
  platforms: [win-x64, linux-x64, darwin-arm64]

interfaces:
  tui: true
  cli: true
  pipe: true
  # No FastAPI/uvicorn route wiring of its own (api_server), and
  # MCPClientMixin makes this an MCP client, not a server (mcp_server).
  api_server: false
  mcp_server: false
