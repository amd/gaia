name: Check Documentation Links

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'cpp/README.md'
      - 'util/check_doc_links.py'
      - 'util/check_doc_citations.py'
      - '.github/workflows/check_doc_links.yml'
      # Citation-checker anchor targets — rerun so symbol drift in these
      # files is caught on the PR that moves them, not on the next doc PR.
      - 'installer/nsis/installer.nsh'
      - 'src/gaia/agents/registry.py'
      - 'src/gaia/agents/base/agent.py'
      - 'src/gaia/installer/export_import.py'
      - 'src/gaia/apps/webui/services/agent-seeder.cjs'
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'cpp/README.md'
      - 'util/check_doc_links.py'
      - 'util/check_doc_citations.py'
      - '.github/workflows/check_doc_links.yml'
      - 'installer/nsis/installer.nsh'
      - 'src/gaia/agents/registry.py'
      - 'src/gaia/agents/base/agent.py'
      - 'src/gaia/installer/export_import.py'
      - 'src/gaia/apps/webui/services/agent-seeder.cjs'
  # Allow manual runs to audit all links on demand
  workflow_dispatch:

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check-internal-links:
    name: Verify internal cross-references
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check internal documentation links
        run: |
          echo "Checking internal cross-references..."
          python util/check_doc_links.py --internal-only --verbose

      - name: Check source-file citations
        run: |
          echo "Checking path:NNN citations to source files..."
          python util/check_doc_citations.py

  check-external-links:
    name: Verify external URLs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check external documentation links
        run: |
          echo "Checking external URLs (with rate limiting)..."
          python util/check_doc_links.py --external-only --max-workers 5
