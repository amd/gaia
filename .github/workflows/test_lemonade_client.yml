name: Test Lemonade Client Integration

on:
  workflow_call:
  push:
    branches: [ main ]
    paths:
      - 'src/gaia/llm/**'
      - 'tests/test_lemonade_client_integration.py'
      - 'setup.py'
      - '.github/workflows/test_lemonade_client.yml'
      - '.github/actions/install-lemonade/**'
      - '.github/actions/setup-venv/**'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/gaia/llm/**'
      - 'tests/test_lemonade_client_integration.py'
      - 'setup.py'
      - '.github/workflows/test_lemonade_client.yml'
      - '.github/actions/install-lemonade/**'
      - '.github/actions/setup-venv/**'
  merge_group:
  workflow_dispatch:

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-lemonade-client:
    name: Test Lemonade Client Integration
    runs-on: ${{ contains(github.event.pull_request.labels.*.name, 'stx-test') && 'stx-test' || 'stx' }}
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || contains(github.event.pull_request.labels.*.name, 'ready_for_ci')

    steps:
    - uses: actions/checkout@v6

    - name: Setup Python environment
      uses: ./.github/actions/setup-venv
      with:
        python-version: '3.12'
        install-package: '.[dev]'

    - name: Install Lemonade Server
      uses: ./.github/actions/install-lemonade

    - name: Start Lemonade Server and Run Client Integration Tests
      shell: powershell
      timeout-minutes: 20
      run: |
        # Set console to UTF-8 for Unicode support
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::InputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8
        $env:PYTHONIOENCODING = "utf-8"
        $env:PYTHONUTF8 = "1"
        chcp 65001 | Out-Null

        try {
            Write-Host "Starting Lemonade server..."
            $serverJob = Start-Job -ScriptBlock {
                # Workaround for Issue #612: Disable Vulkan cooperative matrix optimization
                $env:GGML_VK_DISABLE_COOPMAT = "1"
                & lemonade-server serve --host localhost --port 13305 --no-tray 2>&1
            }
            Write-Host "Started Lemonade server job with ID: $($serverJob.Id)"
            $env:LEMONADE_JOB_ID = $serverJob.Id

            # Wait for server to be ready
            Write-Host "Waiting for Lemonade server to start..."
            $maxWaitTime = 60
            $waitTime = 0
            $serverReady = $false

            while ($waitTime -lt $maxWaitTime -and -not $serverReady) {
                Start-Sleep -Seconds 2
                $waitTime += 2

                try {
                    $response = Invoke-RestMethod -Uri "http://localhost:13305/api/v1/health" -Method GET -TimeoutSec 5
                    Write-Host "[OK] Lemonade server is ready"
                    Write-Host "Health response: $($response | ConvertTo-Json -Compress)"
                    $serverReady = $true
                } catch {
                    Write-Host "Waiting... ($waitTime/$maxWaitTime seconds)"
                }
            }

            if (-not $serverReady) {
                Write-Host "[ERROR] Server health check failed after $maxWaitTime seconds"
                throw "Server failed to start"
            }

            # Pull the small tool-calling LLM the tests exercise. Built-in
            # model => pull by name only (no recipe); this is exactly the
            # #1655 contract the tests assert.
            Write-Host "`n=== Pulling LLM Model ==="
            Write-Host "Pulling Qwen3-0.6B-GGUF..."
            try {
                $body = @{ model_name = "Qwen3-0.6B-GGUF" } | ConvertTo-Json
                $response = Invoke-RestMethod -Uri "http://localhost:13305/api/v1/pull" `
                    -Method POST -ContentType "application/json" -Body $body -TimeoutSec 600
                Write-Host "   [OK] Model pull initiated"
            } catch {
                Write-Host "   [WARN] Pull may have failed: $($_.Exception.Message)"
            }

            # Load LLM into memory so the chat/completions/tools tests have a
            # resident model from the first request.
            Write-Host "`n=== Loading LLM Model ==="
            try {
                $loadRequest = @{
                    model_name = "Qwen3-0.6B-GGUF"
                    ctx_size = 4096
                } | ConvertTo-Json

                Write-Host "Loading model: Qwen3-0.6B-GGUF"
                $loadResponse = Invoke-RestMethod -Uri "http://localhost:13305/api/v1/load" `
                    -Method POST -Body $loadRequest -ContentType "application/json" -TimeoutSec 120
                Write-Host "[OK] Model loaded successfully: $($loadResponse | ConvertTo-Json -Compress)"
            } catch {
                Write-Host "[ERROR] Model load failed: $($_.Exception.Message)"
                if ($_.ErrorDetails) {
                    Write-Host "Error details: $($_.ErrorDetails.Message)"
                }
                # Lemonade returns a generic 500 "llama-server failed to start" and
                # swallows the backend's own stderr -- the real cause is only in the
                # server job stream (launched with 2>&1). Dump it before failing.
                if ($env:LEMONADE_JOB_ID) {
                    Write-Host "`n=== Lemonade / llama-server output (job $env:LEMONADE_JOB_ID) ==="
                    $jobOutput = Receive-Job -Id $env:LEMONADE_JOB_ID -ErrorAction SilentlyContinue
                    if ($jobOutput) { $jobOutput | ForEach-Object { Write-Host $_ } }
                    else { Write-Host "(no server job output captured)" }
                }
                throw "Failed to load LLM model"
            }

            # Also pull the embedding model for the 768-dim smoke check.
            Write-Host "`n=== Pulling Embedding Model ==="
            try {
                $body = @{ model_name = "nomic-embed-text-v2-moe-GGUF" } | ConvertTo-Json
                Invoke-RestMethod -Uri "http://localhost:13305/api/v1/pull" `
                    -Method POST -ContentType "application/json" -Body $body -TimeoutSec 600 | Out-Null
                Write-Host "   [OK] Embedding model pull initiated"
            } catch {
                Write-Host "   [WARN] Embedding pull may have failed: $($_.Exception.Message)"
            }

            # Wait for llamacpp backend to fully initialize
            Write-Host "Waiting 30 seconds for llamacpp backend initialization..."
            Start-Sleep -Seconds 30

            # Verify models are available
            try {
                $models = Invoke-RestMethod -Uri "http://localhost:13305/api/v1/models" -Method GET
                Write-Host "`n[OK] Available models:"
                $models.data | ForEach-Object { Write-Host "   - $($_.id)" }
            } catch {
                Write-Host "[WARN] Could not verify models: $($_.Exception.Message)"
            }

            # Verify the LLM with an actual completion before running the suite.
            Write-Host "`n=== Verifying LLM Model ==="
            $maxRetries = 3
            $retryCount = 0
            $modelReady = $false

            while ($retryCount -lt $maxRetries -and -not $modelReady) {
                try {
                    $testBody = @{
                        model = "Qwen3-0.6B-GGUF"
                        prompt = "Say exactly: Hello World"
                        max_tokens = 10
                    } | ConvertTo-Json
                    $response = Invoke-RestMethod -Uri "http://localhost:13305/api/v1/completions" `
                        -Method POST -ContentType "application/json" -Body $testBody -TimeoutSec 120
                    Write-Host "[OK] LLM verified successfully"
                    $modelReady = $true
                } catch {
                    $retryCount++
                    Write-Host "[WARN] LLM verification attempt $retryCount failed: $($_.Exception.Message)"
                    if ($retryCount -lt $maxRetries) {
                        Write-Host "Waiting 30 seconds before retry..."
                        Start-Sleep -Seconds 30
                    }
                }
            }

            if (-not $modelReady) {
                throw "LLM failed to load after $maxRetries attempts"
            }

            # Run the real-server client integration suite while the server is up.
            Write-Host "`n=== Running Lemonade Client Integration Tests ==="
            pytest tests/test_lemonade_client_integration.py -v -s --tb=long -rA --log-cli-level=INFO
            $testExitCode = $LASTEXITCODE

            Write-Host "`nTests completed with exit code: $testExitCode"

            if ($testExitCode -ne 0) {
                throw "Tests failed with exit code $testExitCode"
            }
        } finally {
            # Always cleanup server
            if ($env:LEMONADE_JOB_ID) {
                Write-Host "`n=== Stopping Lemonade Server ==="
                Stop-Job -Id $env:LEMONADE_JOB_ID -ErrorAction SilentlyContinue
                Remove-Job -Id $env:LEMONADE_JOB_ID -ErrorAction SilentlyContinue
                Write-Host "[OK] Server stopped"
            }
        }

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: lemonade-client-test-results
        path: |
          pytest-results/
          *.log
