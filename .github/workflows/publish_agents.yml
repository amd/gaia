#
# Publish the AMD production *Python* agent wheels (gaia-agent-<id>) to PyPI.
# Issue #1179 (Agent Hub dual distribution): R2 is the canonical source for the
# Hub UI; PyPI is the canonical source for `pip install gaia-agent-<id>`. The
# C++ agent binaries are handled separately by build_agents.yml.
#
# NOTE (#2240): there is deliberately no `amd-gaia[agents]` meta-extra. While
# these wheels aren't live on PyPI (publishing is paused below), declaring
# them as an extras_require entry made the extra unsatisfiable at the
# current amd-gaia release, which made pip/uv silently backtrack-downgrade
# to an older release that didn't declare it. The agent list instead lives
# as a plain constant, setup.py's AGENT_WHEEL_PACKAGES.
#
# Flow:
#   discover (read setup.py's AGENT_WHEEL_PACKAGES -> matrix)
#     -> build  (tag only: build each wheel + twine check, upload artifact)
#       -> approve (tag only: single manual gate, "publish" environment)
#         -> publish (tag only: gh-action-pypi-publish per agent, skip-existing)
#
# The whole workflow is tag-driven (v*) — it does NOT run on PRs. Building all
# agent wheels on every PR touching hub/agents/** was pure noise; broken
# wheels surface at release time instead. Publishing runs ONLY on a version tag
# (v*). Agent wheels version independently (each gaia-agent.yaml/pyproject sets
# its own SemVer), so
# `skip-existing: true` makes a release a no-op for any agent whose version did
# not change — that is PyPI's native version immutability, not custom overwrite
# logic (issue #1179).
#
# Auth: OIDC trusted publishing — NO stored token (matches publish.yml's
# publish-pypi job for the core amd-gaia wheel). The publish job requests an
# id-token and runs in the "pypi" environment; each gaia-agent-* PyPI project
# authorizes this repo+workflow+environment via a trusted publisher. Because
# these projects don't exist on PyPI yet, register PyPI *pending* publishers
# (project gaia-agent-<id>, owner amd, repo gaia, workflow publish_agents.yml,
# environment pypi) — the first run creates each project. The manual gate stays
# on the separate "publish" environment on approve-publish.

name: Publish Agent Wheels (PyPI)

on:
  # Tag-only: the build matrix fires on a `v*` tag, never on PRs (building every
  # agent wheel on each PR was noise). PUBLISHING REMAINS PAUSED (#1179): the
  # approve/publish jobs are hard-gated with `false &&` below, so a `v*` tag
  # builds + twine-checks the wheels but uploads NOTHING to PyPI. To re-enable
  # publishing, drop the `false &&` guards on the approve-publish and publish
  # jobs (the tag trigger is already in place).
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ── Discover: derive the agent matrix from setup.py's AGENT_WHEEL_PACKAGES ──
  # Single source of truth — adding an agent to that list auto-includes it
  # here. No hand-maintained second list to drift.
  discover:
    name: Discover Agent Packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - id: list
        run: |
          MATRIX=$(python util/list_agent_packages.py --format matrix)
          echo "Production agent packages:"
          echo "$MATRIX" | python -m json.tool
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # ── Build: one wheel per agent, twine-checked ───────────────────────
  build:
    name: Build ${{ matrix.dist }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/build-agent-wheel
        with:
          path: ${{ matrix.path }}
          dist: ${{ matrix.dist }}
      - name: Upload distribution
        uses: actions/upload-artifact@v7
        with:
          name: agent-dist-${{ matrix.id }}
          path: ${{ matrix.path }}/dist/
          if-no-files-found: error

  # ── Approve: single manual gate, tag pushes only ────────────────────
  approve-publish:
    name: Approve Publishing
    needs: build
    # Publishing paused (#1179) — `false &&` hard-skips this job. Drop the
    # `false &&` to re-enable (the v* tag trigger is already in place).
    if: false && startsWith(github.ref, 'refs/tags/v') && !cancelled() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - run: echo "All agent wheels built. Publishing to PyPI approved."

  # ── Publish: one PyPI upload per agent, tag pushes only ─────────────
  publish:
    name: Publish ${{ matrix.dist }}
    needs: [discover, approve-publish]
    # Publishing paused (#1179) — `false &&` hard-skips this job. Drop the
    # `false &&` to re-enable (the v* tag trigger is already in place).
    if: false && startsWith(github.ref, 'refs/tags/v') && !cancelled() && needs.approve-publish.result == 'success'
    runs-on: ubuntu-latest
    # OIDC trusted publishing: the action mints a short-lived id-token PyPI
    # exchanges for an upload token. Without id-token: write the action falls
    # back to (missing) password auth and dies with a misleading "trusted
    # publishing exchange failure" — see issue #1568.
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v8
        with:
          name: agent-dist-${{ matrix.id }}
          path: dist/
      - name: Publish ${{ matrix.dist }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PyPI's native version immutability: an unchanged agent version is a
          # no-op, not a failure (issue #1179 — "no overwrite logic").
          skip-existing: true
