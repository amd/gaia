#
# Publish the AMD production *Python* agent wheels (gaia-agent-<id>) to PyPI.
# Issue #1179 (Agent Hub dual distribution): R2 is the canonical source for the
# Hub UI; PyPI is the canonical source for `pip install gaia-agent-<id>` and the
# `amd-gaia[agents]` meta-extra. The C++ agent binaries are handled separately
# by build_agents.yml.
#
# Flow:
#   discover (read setup.py[agents] -> matrix)
#     -> build  (every push/PR: build each wheel + twine check, upload artifact)
#       -> approve (tag only: single manual gate, "publish" environment)
#         -> publish (tag only: gh-action-pypi-publish per agent, skip-existing)
#
# The build job runs on every push/PR touching an agent so a broken wheel is
# caught in review. Publishing runs ONLY on a version tag (v*). Agent wheels
# version independently (each gaia-agent.yaml/pyproject sets its own SemVer), so
# `skip-existing: true` makes a release a no-op for any agent whose version did
# not change — that is PyPI's native version immutability, not custom overwrite
# logic (issue #1179).
#
# Auth: OIDC trusted publishing — NO stored token (matches publish.yml's
# publish-pypi job for the core amd-gaia wheel). The publish job requests an
# id-token and runs in the "pypi" environment; each gaia-agent-* PyPI project
# authorizes this repo+workflow+environment via a trusted publisher. Because
# these projects don't exist on PyPI yet, register PyPI *pending* publishers
# (project gaia-agent-<id>, owner amd, repo gaia, workflow publish_agents.yml,
# environment pypi) — the first run creates each project. The manual gate stays
# on the separate "publish" environment on approve-publish.

name: Publish Agent Wheels (PyPI)

on:
  # PUBLISHING PAUSED (#1179): agent PyPI publishing is disabled while the Agent
  # Hub distribution design is being finalized. The release-tag trigger is
  # intentionally removed so a `v*` tag no longer fires the publish path, and the
  # approve/publish jobs are additionally hard-gated below. To re-enable, restore
  # the `push: tags: ['v*']` trigger here and drop the `false &&` guards on the
  # approve-publish and publish jobs.
  #
  # PRs still get the build/twine-check so broken agent wheels are caught in review.
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'hub/agents/python/**'
      - 'setup.py'
      - 'util/list_agent_packages.py'
      - '.github/workflows/publish_agents.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ── Discover: derive the agent matrix from setup.py[agents] ──────────
  # Single source of truth — adding an agent to the meta-extra auto-includes
  # it here. No hand-maintained second list to drift.
  discover:
    name: Discover Agent Packages
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || contains(github.event.pull_request.labels.*.name, 'ready_for_ci')
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - id: list
        run: |
          MATRIX=$(python util/list_agent_packages.py --format matrix)
          echo "Production agent packages:"
          echo "$MATRIX" | python -m json.tool
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # ── Build: one wheel per agent, twine-checked ───────────────────────
  build:
    name: Build ${{ matrix.dist }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-agent-wheel
        with:
          path: ${{ matrix.path }}
          dist: ${{ matrix.dist }}
      - name: Upload distribution
        uses: actions/upload-artifact@v7
        with:
          name: agent-dist-${{ matrix.id }}
          path: ${{ matrix.path }}/dist/
          if-no-files-found: error

  # ── Approve: single manual gate, tag pushes only ────────────────────
  approve-publish:
    name: Approve Publishing
    needs: build
    # Publishing paused (#1179) — `false &&` hard-skips this job. Remove it (and
    # restore the tag trigger above) to re-enable.
    if: false && startsWith(github.ref, 'refs/tags/v') && !cancelled() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - run: echo "All agent wheels built. Publishing to PyPI approved."

  # ── Publish: one PyPI upload per agent, tag pushes only ─────────────
  publish:
    name: Publish ${{ matrix.dist }}
    needs: [discover, approve-publish]
    # Publishing paused (#1179) — `false &&` hard-skips this job. Remove it (and
    # restore the tag trigger above) to re-enable.
    if: false && startsWith(github.ref, 'refs/tags/v') && !cancelled() && needs.approve-publish.result == 'success'
    runs-on: ubuntu-latest
    # OIDC trusted publishing: the action mints a short-lived id-token PyPI
    # exchanges for an upload token. Without id-token: write the action falls
    # back to (missing) password auth and dies with a misleading "trusted
    # publishing exchange failure" — see issue #1568.
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v8
        with:
          name: agent-dist-${{ matrix.id }}
          path: dist/
      - name: Publish ${{ matrix.dist }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PyPI's native version immutability: an unchanged agent version is a
          # no-op, not a failure (issue #1179 — "no overwrite logic").
          skip-existing: true
