name: Test Lemonade Embeddings

on:
  workflow_call:
  push:
    branches: [ main ]
    paths:
      - 'src/gaia/rag/**'
      - 'src/gaia/llm/**'
      - 'tests/test_lemonade_embeddings.py'
      - 'setup.py'
      - '.github/workflows/test_embeddings.yml'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/gaia/rag/**'
      - 'src/gaia/llm/**'
      - 'tests/test_lemonade_embeddings.py'
      - 'setup.py'
      - '.github/workflows/test_embeddings.yml'
  merge_group:
  workflow_dispatch:

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-embeddings:
    name: Test Lemonade Embeddings API
    runs-on: ${{ contains(github.event.pull_request.labels.*.name, 'stx-test') && 'stx-test' || 'stx' }}
    # Bound a wedged model pull/load — the LemonadeClient pull timeout alone
    # is 200 min; don't let one hold the self-hosted runner for the 6h default.
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || contains(github.event.pull_request.labels.*.name, 'ready_for_ci')

    steps:
    - uses: actions/checkout@v6

    - name: Setup Python environment
      uses: ./.github/actions/setup-venv
      with:
        python-version: '3.12'
        install-package: '.[dev,rag]'
        extra-index-url: 'https://download.pytorch.org/whl/cpu'

    - name: Install Lemonade Server
      uses: ./.github/actions/install-lemonade

    - name: Start Lemonade Server and Run Tests
      shell: powershell
      run: |
        # Set console to UTF-8 for Unicode support
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::InputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8
        $env:PYTHONIOENCODING = "utf-8"
        $env:PYTHONUTF8 = "1"
        chcp 65001 | Out-Null

        try {
            Write-Host "Starting Lemonade server..."
            $serverJob = Start-Job -ScriptBlock {
                # Workaround for Issue #612: Disable Vulkan cooperative matrix optimization
                $env:GGML_VK_DISABLE_COOPMAT = "1"
                & lemonade-server serve --host localhost --port 13305 --no-tray 2>&1
            }
            Write-Host "Started Lemonade server job with ID: $($serverJob.Id)"
            $env:LEMONADE_JOB_ID = $serverJob.Id

            # Wait for server to be ready
            Write-Host "Waiting for Lemonade server to start..."
            $maxWaitTime = 60
            $waitTime = 0
            $serverReady = $false

            while ($waitTime -lt $maxWaitTime -and -not $serverReady) {
                Start-Sleep -Seconds 2
                $waitTime += 2

                try {
                    $response = Invoke-RestMethod -Uri "http://localhost:13305/api/v1/health" -Method GET -TimeoutSec 5
                    Write-Host "[OK] Lemonade server is ready"
                    Write-Host "Health response: $($response | ConvertTo-Json -Compress)"
                    $serverReady = $true
                } catch {
                    Write-Host "Waiting... ($waitTime/$maxWaitTime seconds)"
                }
            }

            if (-not $serverReady) {
                Write-Host "[ERROR] Server health check failed after $maxWaitTime seconds"
                throw "Server failed to start"
            }

            # Stale-backend cleanup on a version change is handled by the
            # install-lemonade action's reconcile step (it clears the versioned
            # llama.cpp backend under %USERPROFILE%\.cache\lemonade\bin so a
            # downgraded server doesn't fail with "llama-server failed to
            # start"). The previous model-cache wipe here targeted a v9-era path
            # (%LOCALAPPDATA%\lemonade-server\models) that doesn't exist in
            # v10 -- GGUF weights live in the HuggingFace hub cache -- so it was
            # a silent no-op and has been removed.

            # Pull + load + verify the embedding model THROUGH GAIA's
            # LemonadeClient so CI validates our actual interface to Lemonade
            # (including the model-load retry that absorbs the transient
            # AMD-Vulkan "llama-server failed to start" fault) rather than raw
            # REST, which would bypass that resilience and flake.
            Write-Host "`n=== Pull + load + verify embedding model via LemonadeClient ==="
            uv run python tests/ci_lemonade_check.py --model nomic-embed-text-v2-moe-GGUF --embeddings
            if ($LASTEXITCODE -ne 0) {
                if ($env:LEMONADE_JOB_ID) {
                    Write-Host "Server output:"
                    Receive-Job -Id $env:LEMONADE_JOB_ID -ErrorAction SilentlyContinue
                }
                throw "Embedding model setup/verify via LemonadeClient failed"
            }

            # Run tests in same session while server is running
            Write-Host "`n=== Running Embedding Tests ==="
            # Use --tb=long for full traceback, -rA for all test output summary
            pytest tests/test_lemonade_embeddings.py -v -s --tb=long -rA --log-cli-level=DEBUG
            $testExitCode = $LASTEXITCODE

            Write-Host "`nTests completed with exit code: $testExitCode"

            if ($testExitCode -ne 0) {
                throw "Tests failed with exit code $testExitCode"
            }
        } finally {
            # Always cleanup server
            if ($env:LEMONADE_JOB_ID) {
                Write-Host "`n=== Stopping Lemonade Server ==="
                Stop-Job -Id $env:LEMONADE_JOB_ID -ErrorAction SilentlyContinue
                Remove-Job -Id $env:LEMONADE_JOB_ID -ErrorAction SilentlyContinue
                Write-Host "[OK] Server stopped"
            }
        }

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: embedding-test-results
        path: |
          pytest-results/
          *.log
