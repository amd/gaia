name: Test Lemonade Embeddings

on:
  workflow_call:
  push:
    branches: [ main ]
    paths:
      - 'src/gaia/version.py'
      - '.github/actions/install-lemonade/**'
      - 'src/gaia/rag/**'
      - 'src/gaia/llm/**'
      - 'tests/test_lemonade_embeddings.py'
      - 'setup.py'
      - '.github/workflows/test_embeddings.yml'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/gaia/version.py'
      - '.github/actions/install-lemonade/**'
      - 'src/gaia/rag/**'
      - 'src/gaia/llm/**'
      - 'tests/test_lemonade_embeddings.py'
      - 'setup.py'
      - '.github/workflows/test_embeddings.yml'
  merge_group:
  workflow_dispatch:

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-embeddings:
    name: Test Lemonade Embeddings API
    runs-on: ${{ contains(github.event.pull_request.labels.*.name, 'stx-test') && 'stx-test' || 'stx' }}
    # Bound a wedged model pull/load — the LemonadeClient pull timeout alone
    # is 200 min; don't let one hold the self-hosted runner for the 6h default.
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || contains(github.event.pull_request.labels.*.name, 'ready_for_ci')

    steps:
    - uses: actions/checkout@v7

    - name: Setup Python environment
      uses: ./.github/actions/setup-venv
      with:
        python-version: '3.12'
        install-package: '.[dev,rag]'
        extra-index-url: 'https://download.pytorch.org/whl/cpu'

    - name: Install Lemonade Server
      uses: ./.github/actions/install-lemonade

    # Start the server via the shared launcher (its own step): it reaps stray
    # procs, frees the port, launches LemonadeServer.exe --port directly (the
    # `lemonade-server serve` shim was removed in Lemonade v10.5 and no longer
    # exists on the runner), captures stdout/stderr to logs, waits for health
    # (dumping the logs on failure), and exports LEMONADE_PROCESS_ID (via
    # GITHUB_ENV) for the test + cleanup steps.
    - name: Start Lemonade Server
      shell: powershell
      run: .\installer\scripts\start-lemonade.ps1 -Port 13305 -NoModel

    - name: Register embedder and run embedding tests
      shell: powershell
      run: |
        # Set console to UTF-8 for Unicode support
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::InputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8
        $env:PYTHONIOENCODING = "utf-8"
        $env:PYTHONUTF8 = "1"
        chcp 65001 | Out-Null

        # Register + load + verify the embedding model THROUGH GAIA's
        # LemonadeClient so CI validates our actual interface to Lemonade
        # (including the model-load retry that absorbs the transient AMD-Vulkan
        # "llama-server failed to start" fault) rather than raw REST.
        #
        # EmbeddingGemma is a custom user-model, so pass the checkpoint +
        # recipe + embedding label to register it on first pull.
        Write-Host "=== Register + load + verify embedding model via LemonadeClient ==="
        uv run python tests/ci_lemonade_check.py --model user.embeddinggemma-300m-GGUF --checkpoint ggml-org/embeddinggemma-300M-GGUF:Q8_0 --recipe llamacpp --register-embedding --embeddings
        if ($LASTEXITCODE -ne 0) {
            Write-Host "=== Server stdout (last 100 lines) ==="
            Get-Content lemonade-server-stdout.log -Tail 100 -ErrorAction SilentlyContinue
            Write-Host "=== Server stderr (last 100 lines) ==="
            Get-Content lemonade-server-stderr.log -Tail 100 -ErrorAction SilentlyContinue
            throw "Embedding model setup/verify via LemonadeClient failed"
        }

        Write-Host "`n=== Running Embedding Tests ==="
        # Use --tb=long for full traceback, -rA for all test output summary
        pytest tests/test_lemonade_embeddings.py -v -s --tb=long -rA --log-cli-level=DEBUG
        if ($LASTEXITCODE -ne 0) { throw "Tests failed with exit code $LASTEXITCODE" }

    - name: Stop Lemonade Server
      if: always()
      shell: powershell
      run: |
        if ($env:LEMONADE_PROCESS_ID) {
            Write-Host "Stopping Lemonade Server (PID $env:LEMONADE_PROCESS_ID)..."
            Stop-Process -Id $env:LEMONADE_PROCESS_ID -Force -ErrorAction SilentlyContinue
        }
        .\installer\scripts\cleanup-lemonade.ps1 -Port 13305

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: embedding-test-results
        path: |
          pytest-results/
          *.log
