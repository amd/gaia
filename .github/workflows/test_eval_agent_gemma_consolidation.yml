# Agent eval gate for the Gemma-4-E4B consolidation.
#
# Every agent now shares `Gemma-4-E4B-it-GGUF`; agents that previously left
# `model_id` unset fell back to `Qwen3.5-35B-A3B-GGUF`. That is an LLM-affecting
# change, and CLAUDE.md requires `gaia eval agent` runs against the committed
# baselines before such a change lands. Unit tests cover code paths, not model
# behavior — this job is the only thing that catches a behavioral regression.
#
# RUNNER. Strix Halo (`stx`), which is WINDOWS — every inline step is PowerShell,
# and bash syntax (`&&`, `\` continuations, `source`) is unavailable. Python goes
# through ./.github/actions/setup-venv and Lemonade through
# ./.github/actions/install-lemonade, per the lab-runner convention in
# test_gaia_cli_windows.yml. Running this locally on a dev machine is not a
# substitute: a 4B model on non-AMD hardware takes ~7 min/scenario and the
# committed baselines were recorded on AMD, so only this pool produces numbers
# comparable to them.
#
# SERIALIZATION. `concurrency.group` is a fixed string, deliberately NOT keyed on
# ref: CLAUDE.md requires at most ONE `gaia eval agent` process at a time,
# because concurrent runs race-evict each other's model out of the LLM slot and
# produce bogus BLOCKED_BY_ARCHITECTURE / context-size failures.
# `cancel-in-progress: false` so a queued run waits rather than killing a run
# that is already mid-eval.
#
# WHY THIS REPORTS BY DEFAULT (`enforce`, default false)
# ------------------------------------------------------
# `gaia eval agent --compare BASELINE CURRENT` exits 2 on any status/score/time
# regression and 0 otherwise (src/gaia/cli.py). Wiring that straight to the step
# result would make this job PERMANENTLY RED, because some regressions here are
# EXPECTED and accepted: the agents that moved off Qwen (Analyst/`data`, and the
# tool_selection set) dropped from a 35B MoE to a ~4B dense model. A gate that is
# always red gates nothing. So the default posture is REPORT — compare every
# category, print the diff, upload the scorecards, surface regressions as
# `::warning::` — and `enforce: true` makes them blocking once the accepted
# regressions are folded into refreshed baselines.
#
# READING THE RESULT. Most `rag_quality` scenarios run the `doc` agent, which
# comes from hub/agents/python/chat and was ALREADY on Gemma — they should be
# flat, and a green rag_quality does NOT by itself mean "no impact". The
# scenarios that actually exercise this change are `csv_analysis` (the `data`
# agent, previously Qwen 35B) and the tool_selection set.
#
# SEQUENCING. `--compare` only DIFFS two scorecards — it does NOT run an eval.
# Each category is evaluated first, the ABSOLUTE run directory is read from the
# eval's own `Output: <run-dir>` line (src/gaia/eval/runner.py), and
# `<run-dir>/scorecard.json` is then compared. Never glob by mtime — a fresh
# clone stamps every file with the checkout time.

name: Agent Eval — Gemma-4-E4B consolidation (Strix Halo)

on:
  workflow_dispatch:
    inputs:
      enforce:
        description: 'Fail the build on a regression (false = report as ::warning:: only)'
        required: false
        type: boolean
        default: false
      categories:
        description: 'Space-separated categories to run'
        required: false
        default: 'rag_quality context_retention tool_selection'
      timeout_per_scenario:
        description: 'Per-scenario timeout in seconds'
        required: false
        default: '1800'
  push:
    branches-ignore:
      - main
    # Cover every LLM-affecting surface CLAUDE.md lists (system prompts, tool
    # registration/schemas, error classification, default model, tool-call
    # parsing) — not just the files one PR happened to touch. A filter narrower
    # than the blast radius silently skips the gate on the PR that needed it:
    # `rag/sdk.py` carries the RAG default model and `cli.py` resolves the
    # context size, and neither lives under the paths you would first guess.
    #
    # DELIBERATELY EXCLUDED (not oversights): unit tests, src/gaia/apps/webui/**
    # and docs. None change model behavior, and a long single-slot eval should
    # not queue behind every frontend tweak or typo fix.
    paths:
      - 'src/gaia/agents/**'
      - 'src/gaia/llm/**'
      - 'src/gaia/rag/**'
      - 'src/gaia/chat/**'
      - 'src/gaia/mcp/**'
      - 'src/gaia/ui/_chat_helpers.py'
      - 'src/gaia/apps/jira/app.py'
      - 'src/gaia/cli.py'
      - 'hub/agents/python/**'
      - 'eval/scenarios/**'
      - 'tests/fixtures/eval_baselines/**'
      - '.github/workflows/test_eval_agent_gemma_consolidation.yml'

concurrency:
  group: gaia-agent-eval
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  agent-eval:
    name: Agent eval vs committed Gemma baselines
    runs-on: ${{ contains(github.event.pull_request.labels.*.name, 'stx-test') && 'stx-test' || 'stx' }}
    timeout-minutes: 180
    env:
      BASELINE_DIR: tests/fixtures/eval_baselines/gemma-4-e4b-d71cd914
      BACKEND_URL: http://127.0.0.1:4200
      LEMONADE_PORT: '13305'
      ENFORCE: ${{ github.event.inputs.enforce || 'false' }}
      CATEGORIES: ${{ github.event.inputs.categories || 'rag_quality context_retention tool_selection' }}
      SCENARIO_TIMEOUT: ${{ github.event.inputs.timeout_per_scenario || '1800' }}
      # Loopback services — bypass any runner proxy so requests reach them.
      NO_PROXY: 'localhost,127.0.0.1'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
        with:
          python-version: '3.12'
          # [ui] carries fastapi/uvicorn + the RAG deps gaia.ui.server imports at
          # boot — the eval drives that server, so [dev] alone fails at import.
          # [eval] pulls the judge deps, [api] the connectors layer.
          install-package: '.[dev,eval,ui,api]'
          extra-index-url: 'https://download.pytorch.org/whl/cpu'

      - name: Install Lemonade Server
        uses: ./.github/actions/install-lemonade

      - name: Install the hub agents the scenarios target
        shell: powershell
        run: |
          # Scenarios select their agent via `agent_type`: 15 request `doc` and
          # one requests `data`. `doc` (and `chat`/`file`) come from the chat
          # package's entry points, NOT from docqa — docqa registers as `docqa`
          # and no scenario asks for it. Without these the backend exposes
          # neither id, every scenario fails to resolve an agent, and the run
          # reports a catastrophic regression that never actually happened.
          uv pip install -e hub/agents/python/chat -e hub/agents/python/analyst
          if ($LASTEXITCODE -ne 0) { throw "hub agent install failed" }

      - name: Preflight — judge key and baselines
        shell: powershell
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if (-not $env:ANTHROPIC_API_KEY) {
            Write-Host "::error::ANTHROPIC_API_KEY is not set. The eval judge (src/gaia/eval/claude.py) reads it from the environment; without it every scenario scores as an infra error and the scorecard is meaningless."
            exit 1
          }
          foreach ($c in ($env:CATEGORIES -split '\s+' | Where-Object { $_ })) {
            $b = Join-Path $env:BASELINE_DIR "scorecard_$c.json"
            if (-not (Test-Path $b)) {
              Write-Host "::error::Missing baseline $b. Pick the baseline matching the model under test; do not substitute another directory."
              exit 1
            }
            Write-Host "baseline ok: $b"
          }

      - name: Start Lemonade + backend, run categories serially
        shell: powershell
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GAIA_MEMORY_DISABLED: '1'
          LEMONADE_BASE_URL: http://127.0.0.1:13305/api/v1
        run: |
          # Lemonade AND the backend AND the evals must share ONE PowerShell
          # session: a detached Start-Process child does not survive a GitHub
          # Actions step boundary, so splitting these across steps leaves the
          # eval unable to reach a server that did start (see the single-session
          # note in test_agent_behavior_e2e.yml).
          New-Item -ItemType Directory -Force -Path eval-out | Out-Null
          $backend = $null
          try {
              # ctx 65536 = GPU_CTX_SIZE, the window every agent now requests.
              # Starting Lemonade below it would make GAIA reload the model at
              # the larger window on first use and skew the first scenario.
              .\installer\scripts\start-lemonade.ps1 `
                  -ModelName "Gemma-4-E4B-it-GGUF" `
                  -AdditionalModels "nomic-embed-text-v2-moe-GGUF" `
                  -Port $env:LEMONADE_PORT `
                  -CtxSize 65536 `
                  -InitWaitTime 15

              $backend = Start-Process -FilePath "python" `
                  -ArgumentList "-m","gaia.ui.server","--port","4200","--host","127.0.0.1" `
                  -PassThru -NoNewWindow `
                  -RedirectStandardOutput "eval-out\backend.log" `
                  -RedirectStandardError  "eval-out\backend.err.log"

              Write-Host "Waiting for the GAIA UI backend on $env:BACKEND_URL (pid $($backend.Id))..."
              $ready = $false
              foreach ($i in 1..60) {
                  if ($backend.HasExited) {
                      Write-Host "::error::gaia.ui.server exited during startup (code $($backend.ExitCode)). Log follows."
                      Get-Content eval-out\backend.err.log -ErrorAction SilentlyContinue
                      throw "backend died"
                  }
                  try {
                      Invoke-RestMethod -Uri "$env:BACKEND_URL/api/health" -TimeoutSec 5 | Out-Null
                      $ready = $true; break
                  } catch { Start-Sleep -Seconds 5 }
              }
              if (-not $ready) {
                  Write-Host "::error::GAIA UI backend did not become healthy within 5 minutes."
                  Get-Content eval-out\backend.err.log -ErrorAction SilentlyContinue
                  throw "backend not healthy"
              }
              Write-Host "Backend healthy."

              # Record which agents resolved. If `doc`/`data` are absent the run
              # is worthless — fail here rather than emit a fake regression.
              $agents = Invoke-RestMethod -Uri "$env:BACKEND_URL/api/agents" -TimeoutSec 30
              $ids = @($agents | ForEach-Object { $_.id })
              Write-Host "Agents exposed: $($ids -join ', ')"
              foreach ($needed in @('doc','data')) {
                  if ($ids -notcontains $needed) {
                      Write-Host "::error::Agent '$needed' is not registered, but scenarios request it. Every such scenario would fail to resolve an agent and score 0, producing a fabricated regression. Check the hub agent install step."
                      throw "missing agent $needed"
                  }
              }

              # SERIAL by construction: a foreach loop in one step, never
              # backgrounded. Two concurrent `gaia eval agent` runs race-evict
              # each other's model out of the single LLM slot (CLAUDE.md).
              foreach ($c in ($env:CATEGORIES -split '\s+' | Where-Object { $_ })) {
                  Write-Host "=================================================================="
                  Write-Host "  gaia eval agent --category $c --timeout $env:SCENARIO_TIMEOUT"
                  Write-Host "=================================================================="
                  gaia eval agent --category $c `
                      --backend $env:BACKEND_URL `
                      --timeout $env:SCENARIO_TIMEOUT 2>&1 |
                      Tee-Object -FilePath "eval-out\$c.log"
                  # `gaia eval agent --category` exits 0 whatever the scenarios
                  # score; a non-zero here is a harness crash, not a regression.
                  if ($LASTEXITCODE -ne 0) {
                      Write-Host "::error::gaia eval agent crashed on $c (exit $LASTEXITCODE)."
                      throw "eval harness failed on $c"
                  }
              }
          }
          finally {
              if ($backend -and -not $backend.HasExited) {
                  Stop-Process -Id $backend.Id -Force -ErrorAction SilentlyContinue
              }
              if ($env:LEMONADE_PROCESS_ID) {
                  Write-Host "Stopping Lemonade (pid $env:LEMONADE_PROCESS_ID)..."
                  Stop-Process -Id $env:LEMONADE_PROCESS_ID -Force -ErrorAction SilentlyContinue
              }
          }

      - name: Compare each category against its committed baseline
        if: always()
        shell: powershell
        run: |
          $regressed = @()
          $failed    = $false

          foreach ($c in ($env:CATEGORIES -split '\s+' | Where-Object { $_ })) {
              $log = "eval-out\$c.log"
              if (-not (Test-Path $log)) {
                  Write-Host "::warning::No log for $c — the chain stopped before it ran."
                  $failed = $true; continue
              }
              # The runner prints an ABSOLUTE `Output: <run-dir>` line
              # (src/gaia/eval/runner.py). Take the LAST match. Never mtime-glob.
              $runDir = (Select-String -Path $log -Pattern '^Output:\s*(.+)$' |
                         ForEach-Object { $_.Matches[0].Groups[1].Value.Trim() } |
                         Select-Object -Last 1)
              $card = if ($runDir) { Join-Path $runDir "scorecard.json" } else { $null }
              if (-not $card -or -not (Test-Path $card)) {
                  Write-Host "::error::Could not resolve a scorecard for $c (parsed run dir: '$runDir'). See eval-out\$c.log."
                  $failed = $true; continue
              }
              New-Item -ItemType Directory -Force -Path "eval-out\$c" | Out-Null
              Copy-Item $card "eval-out\$c\scorecard.json" -Force

              $baseline = Join-Path $env:BASELINE_DIR "scorecard_$c.json"
              Write-Host ""
              Write-Host "=================================================================="
              Write-Host "  $c : $baseline  ->  $card"
              Write-Host "=================================================================="
              # Exits 2 on regression, 0 otherwise. Only DIFFS; the eval already ran.
              gaia eval agent --compare $baseline $card
              switch ($LASTEXITCODE) {
                  0 { Write-Host "$c : no regression vs baseline." }
                  2 { Write-Host "::warning::$c : regression detected vs $baseline (see diff above)."
                      $regressed += $c }
                  default { Write-Host "::error::$c : compare failed with exit $LASTEXITCODE (harness/IO error, not a regression verdict)."
                            $failed = $true }
              }
          }

          Write-Host ""
          Write-Host "=================================================================="
          Write-Host "  SUMMARY — enforce=$env:ENFORCE"
          Write-Host "=================================================================="
          if ($regressed.Count) { Write-Host "Regressed categories: $($regressed -join ', ')" }
          else                  { Write-Host "Regressed categories: none" }
          Write-Host "Baselines: $env:BASELINE_DIR"
          Write-Host ""
          Write-Host "Expected: the agents that moved off Qwen 35B (Analyst/'data',"
          Write-Host "tool_selection) may regress — that tradeoff is accepted. Most"
          Write-Host "rag_quality scenarios run the 'doc' agent, which was already on"
          Write-Host "Gemma, so a flat rag_quality does not by itself prove 'no impact'."
          Write-Host "=================================================================="

          # A harness/IO error is never tolerated — it means we did not measure.
          if ($failed) {
              Write-Host "::error::One or more comparisons could not be performed. Failing regardless of enforce."
              exit 1
          }
          if ($regressed.Count -and $env:ENFORCE -eq 'true') {
              Write-Host "::error::Regressions in $($regressed -join ', '). enforce=true — failing. Fix and re-run, or regenerate the baseline with --save-baseline and call it out in the PR description."
              exit 1
          }
          if ($regressed.Count) {
              Write-Host "Report mode (enforce=false): regressions logged as warnings, build stays green."
          }

      - name: Upload scorecards + eval logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-eval-gemma-consolidation
          path: eval-out/
          if-no-files-found: warn
