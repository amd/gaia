name: Test RAG

on:
  workflow_call:
  push:
    branches: [ main ]
    paths:
      - 'src/gaia/version.py'
      - '.github/actions/install-lemonade/**'
      - 'src/gaia/rag/**'
      - 'src/gaia/llm/**'
      - 'src/gaia/vlm/**'
      - 'tests/test_rag*.py'
      - 'setup.py'
      - '.github/workflows/test_rag.yml'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/gaia/version.py'
      - '.github/actions/install-lemonade/**'
      - 'src/gaia/rag/**'
      - 'src/gaia/llm/**'
      - 'src/gaia/vlm/**'
      - 'tests/test_rag*.py'
      - 'setup.py'
      - '.github/workflows/test_rag.yml'
  merge_group:
  workflow_dispatch:

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-rag-unit:
    name: RAG Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || contains(github.event.pull_request.labels.*.name, 'ready_for_ci')

    steps:
    - uses: actions/checkout@v7

    - name: Free disk space
      uses: ./.github/actions/free-disk-space

    - name: Setup Python environment
      uses: ./.github/actions/setup-venv
      with:
        python-version: '3.12'
        install-package: '.[dev,rag]'
        extra-index-url: 'https://download.pytorch.org/whl/cpu'

    - name: Install additional test dependencies
      run: |
        uv pip install pytest-cov --python .venv/bin/python

    - name: Run RAG unit tests
      run: |
        echo "Running RAG unit tests..."
        pytest tests/test_rag.py -v -s --tb=short --cov=src/gaia/rag --cov-report=term-missing

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: rag-unit-test-coverage
        path: .coverage

  test-rag-integration:
    name: RAG Integration Tests
    runs-on: ${{ contains(github.event.pull_request.labels.*.name, 'stx-test') && 'stx-test' || 'stx' }}
    # Bound a wedged model pull/load — the LemonadeClient pull timeout alone
    # is 200 min; don't let one hold the self-hosted runner for the 6h default.
    timeout-minutes: 60
    needs: test-rag-unit
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || contains(github.event.pull_request.labels.*.name, 'ready_for_ci')

    steps:
    - uses: actions/checkout@v7

    - name: Setup Python environment
      uses: ./.github/actions/setup-venv
      with:
        python-version: '3.12'
        install-package: '.[dev,rag]'
        extra-index-url: 'https://download.pytorch.org/whl/cpu'

    - name: Install additional test dependencies
      shell: powershell
      run: |
        uv pip install reportlab --python .venv\Scripts\python.exe

    - name: Install Lemonade Server
      uses: ./.github/actions/install-lemonade

    # Start the server via the shared launcher (its own step): it reaps stray
    # procs, frees the port, launches LemonadeServer.exe --port directly (the
    # `lemonade-server serve` shim was removed in Lemonade v10.5 and no longer
    # exists on the runner), captures stdout/stderr to logs, waits for health
    # (dumping the logs on failure), and exports LEMONADE_PROCESS_ID (via
    # GITHUB_ENV) for the test + cleanup steps. RAG loads its models via the
    # runtime API below, which pins ctx_size per-model on the load call.
    - name: Start Lemonade Server
      shell: powershell
      run: .\installer\scripts\start-lemonade.ps1 -Port 13305 -NoModel

    - name: Prepare models and run RAG integration tests
      shell: powershell
      run: |
        # Set console to UTF-8 for Unicode support
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::InputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8
        $env:PYTHONIOENCODING = "utf-8"
        $env:PYTHONUTF8 = "1"
        chcp 65001 | Out-Null

        # Pre-pull the LLM + VLM via GAIA's LemonadeClient (the embedder is
        # registered+loaded below). Pulls are a non-fatal pre-warm -- tolerate a
        # transient failure and continue (the model auto-downloads on load). CI
        # drives Lemonade through our client, not raw REST.
        Write-Host "=== Pre-pulling LLM + VLM via LemonadeClient ==="
        uv run python tests/ci_lemonade_check.py --model Qwen3-4B-Instruct-2507-GGUF --pull-only
        if ($LASTEXITCODE -ne 0) { Write-Host "   [WARN] LLM pre-pull failed; continuing (auto-downloads on load)" }
        uv run python tests/ci_lemonade_check.py --model Qwen3-VL-4B-Instruct-GGUF --pull-only
        if ($LASTEXITCODE -ne 0) { Write-Host "   [WARN] VLM pre-pull failed; continuing (auto-downloads on load)" }

        # Register + load + verify the embedding model THROUGH GAIA's
        # LemonadeClient so CI exercises the production load path -- including
        # the bounded retry that absorbs the transient AMD-Vulkan "llama-server
        # failed to start" fault. Raw REST would bypass it.
        #
        # EmbeddingGemma is a custom user-model, so pass the checkpoint +
        # recipe + embedding label to register it on first pull.
        Write-Host "`n=== Register + load + verify embedding model via LemonadeClient ==="
        uv run python tests/ci_lemonade_check.py --model user.embeddinggemma-300m-GGUF --checkpoint ggml-org/embeddinggemma-300M-GGUF:Q8_0 --recipe llamacpp --register-embedding --embeddings
        if ($LASTEXITCODE -ne 0) {
            Write-Host "=== Server stdout (last 100 lines) ==="
            Get-Content lemonade-server-stdout.log -Tail 100 -ErrorAction SilentlyContinue
            Write-Host "=== Server stderr (last 100 lines) ==="
            Get-Content lemonade-server-stderr.log -Tail 100 -ErrorAction SilentlyContinue
            throw "Embedding model setup/verify via LemonadeClient failed"
        }

        Write-Host "`n=== Running RAG Integration Tests ==="
        python tests/test_rag_integration.py
        if ($LASTEXITCODE -ne 0) { throw "Tests failed with exit code $LASTEXITCODE" }

    - name: Stop Lemonade Server
      if: always()
      shell: powershell
      run: |
        if ($env:LEMONADE_PROCESS_ID) {
            Write-Host "Stopping Lemonade Server (PID $env:LEMONADE_PROCESS_ID)..."
            Stop-Process -Id $env:LEMONADE_PROCESS_ID -Force -ErrorAction SilentlyContinue
        }
        .\installer\scripts\cleanup-lemonade.ps1 -Port 13305

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: rag-integration-test-results
        path: |
          pytest-results/
          *.log
