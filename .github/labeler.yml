# Auto-labeling configuration for pull requests
# See: https://github.com/actions/labeler

# Documentation changes (user-facing docs only)
documentation:
  - changed-files:
    - any-glob-to-any-file: ['docs/**/*', 'README.md', 'CONTRIBUTING.md']

# C++ agent framework changes
cpp:
  - changed-files:
    - any-glob-to-any-file: ['cpp/**/*', 'docs/guides/cpp.mdx', '.github/workflows/build_cpp.yml']

# Agent system changes (base agent or multiple agents)
agents:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/agents/**/*']

# Agent SDK changes
chat:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/chat/**/*', 'docs/guides/chat.md', 'docs/sdk/sdks/chat.md']

# MCP changes
mcp:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/mcp/**/*', 'docs/guides/mcp.md', 'docs/spec/mcp-*']

# RAG changes
rag:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/rag/**/*', 'docs/sdk/sdks/rag.md', 'docs/spec/rag-*']

# LLM backend changes
llm:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/llm/**/*', 'docs/sdk/sdks/llm.md', 'docs/spec/llm-*']

# Audio changes (ASR/TTS)
audio:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/audio/**/*', 'docs/sdk/sdks/audio.md']

# Talk agent changes
talk:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/talk/**/*', 'docs/guides/talk.md', 'docs/sdk/agents/talk.md']

# ---------------------------------------------------------------------------
# Terminal Agent Hub: Go TUI, daemon supervisor, and the agent sidecar contract
# (milestone #45). Kept with the src/gaia area rules above the hub-agent block.
# ---------------------------------------------------------------------------

# Go terminal UI (gaia-tui)
tui:
  - changed-files:
    - any-glob-to-any-file: ['tui/**/*', '.github/workflows/build_tui.yml']

# Daemon supervisor / sidecar control plane
daemon:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/daemon/**/*']

# Agent sidecar contract / harness
sidecar:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/daemon/sidecars/**/*', 'hub/agents/*/python/packaging/**/*']

# ---------------------------------------------------------------------------
# Hub agents (hub/agents/<id>/python, hub/agents/<id>/npm). One label per
# packaged agent so a PR touching a single agent's sources is labelled for it.
# ---------------------------------------------------------------------------

# Email agent changes (hub package: frozen Python sidecar + npm client)
agent::email:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/email/python/**/*', 'hub/agents/email/npm/**/*', 'docs/guides/email.mdx']

agent::analyst:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/analyst/python/**/*', 'docs/guides/analyze.mdx']

agent::blender:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/blender/python/**/*', 'docs/guides/blender.mdx']

agent::browser:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/browser/python/**/*', 'docs/guides/browse.mdx']

agent::code:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/code/python/**/*', 'docs/guides/code.mdx']

agent::connectors-demo:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/connectors-demo/python/**/*']

agent::docker:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/docker/python/**/*', 'docs/guides/docker.mdx']

agent::docqa:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/docqa/python/**/*']

agent::emr:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/emr/python/**/*', 'docs/guides/emr.mdx']

agent::fileio:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/fileio/python/**/*']

agent::jira:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/jira/python/**/*', 'src/gaia/apps/jira/**/*', 'docs/guides/jira.mdx']

agent::routing:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/routing/python/**/*', 'docs/guides/routing.mdx']

agent::sd:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/sd/python/**/*']

agent::summarize:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/summarize/python/**/*']

# Tutorial / reference example agents (hello-world, word-count, doc-search)
agent::examples:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/hello-world/python/**/*', 'hub/agents/word-count/python/**/*', 'hub/agents/doc-search/python/**/*']

# Evaluation framework changes
eval:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/eval/**/*', 'docs/reference/eval.md']

# Test changes
tests:
  - changed-files:
    - any-glob-to-any-file: ['tests/**/*']

# DevOps changes (.github, CI/CD, config files)
devops:
  - changed-files:
    - any-glob-to-any-file: ['.github/**/*', 'CLAUDE.md', '.gitignore', '.editorconfig']

# CLI changes
cli:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/cli.py', 'docs/reference/cli.md']

# Installer changes
installer:
  - changed-files:
    - any-glob-to-any-file: ['installer/**/*', 'docs/deployment/installer.md']

# Electron app changes
electron:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/apps/**/*.html', 'src/gaia/apps/**/*.js', 'src/gaia/apps/**/*.css']

# Website changes (Astro + Tailwind landing site)
website:
  - changed-files:
    - any-glob-to-any-file: ['website/**/*']

# Dependencies
dependencies:
  - changed-files:
    - any-glob-to-any-file: ['setup.py', 'pyproject.toml', 'requirements*.txt', 'uv.lock', 'package.json', 'package-lock.json']

# Security-sensitive changes
security:
  - changed-files:
    - any-glob-to-any-file: ['docs/sdk/security.md', 'src/gaia/**/security.py', '.github/workflows/test_security.yml']

# Performance-critical changes
performance:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/llm/**/*', 'src/gaia/rag/**/*', 'src/gaia/eval/**/*']
