# Auto-labeling configuration for pull requests
# See: https://github.com/actions/labeler

# Documentation changes (user-facing docs only)
documentation:
  - changed-files:
    - any-glob-to-any-file: ['docs/**/*', 'README.md', 'CONTRIBUTING.md']

# C++ agent framework changes
cpp:
  - changed-files:
    - any-glob-to-any-file: ['cpp/**/*', 'docs/guides/cpp.mdx', '.github/workflows/build_cpp.yml']

# Agent system changes (base agent or multiple agents)
agents:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/agents/**/*']

# Agent SDK changes
chat:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/chat/**/*', 'docs/guides/chat.md', 'docs/sdk/sdks/chat.md']

# Code agent specific (use "agents" for general agent changes)
code-agent:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/agents/code_agent.py', 'docs/guides/code.md', 'docs/spec/code-*']

# MCP changes
mcp:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/mcp/**/*', 'docs/guides/mcp.md', 'docs/spec/mcp-*']

# RAG changes
rag:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/rag/**/*', 'docs/sdk/sdks/rag.md', 'docs/spec/rag-*']

# LLM backend changes
llm:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/llm/**/*', 'docs/sdk/sdks/llm.md', 'docs/spec/llm-*']

# Audio changes (ASR/TTS)
audio:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/audio/**/*', 'docs/sdk/sdks/audio.md']

# Talk agent changes
talk:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/talk/**/*', 'docs/guides/talk.md', 'docs/sdk/agents/talk.md']

# Blender agent changes
blender:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/agents/blender_agent.py', 'docs/guides/blender.md', 'docs/spec/blender-agent.md']

# Jira agent changes
jira:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/agents/jira_agent.py', 'src/gaia/apps/jira/**/*', 'docs/guides/jira.md', 'docs/spec/jira-agent.md']

# ---------------------------------------------------------------------------
# Hub agents (hub/agents/python/<id>, hub/agents/npm/<id>). One label per
# packaged agent so a PR touching a single agent's sources is labelled for it.
# ---------------------------------------------------------------------------

# Email agent changes (hub package: frozen Python sidecar + npm client)
agent::email:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/email/**/*', 'hub/agents/npm/agent-email/**/*', 'docs/guides/email.mdx']

agent::analyst:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/analyst/**/*', 'docs/guides/analyze.mdx']

agent::blender:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/blender/**/*', 'docs/guides/blender.mdx']

agent::browser:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/browser/**/*', 'docs/guides/browse.mdx']

agent::code:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/code/**/*', 'docs/guides/code.mdx']

agent::connectors-demo:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/connectors-demo/**/*']

agent::docker:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/docker/**/*', 'docs/guides/docker.mdx']

agent::docqa:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/docqa/**/*']

agent::emr:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/emr/**/*', 'docs/guides/emr.mdx']

agent::fileio:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/fileio/**/*']

agent::jira:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/jira/**/*', 'docs/guides/jira.mdx']

agent::routing:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/routing/**/*', 'docs/guides/routing.mdx']

agent::sd:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/sd/**/*']

agent::summarize:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/summarize/**/*']

# Tutorial / reference example agents (hello-world, word-count, doc-search)
agent::examples:
  - changed-files:
    - any-glob-to-any-file: ['hub/agents/python/hello-world/**/*', 'hub/agents/python/word-count/**/*', 'hub/agents/python/doc-search/**/*']

# Evaluation framework changes
eval:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/eval/**/*', 'docs/reference/eval.md']

# Test changes
tests:
  - changed-files:
    - any-glob-to-any-file: ['tests/**/*']

# DevOps changes (.github, CI/CD, config files)
devops:
  - changed-files:
    - any-glob-to-any-file: ['.github/**/*', 'CLAUDE.md', '.gitignore', '.editorconfig']

# CLI changes
cli:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/cli.py', 'docs/reference/cli.md']

# Installer changes
installer:
  - changed-files:
    - any-glob-to-any-file: ['installer/**/*', 'docs/deployment/installer.md']

# Electron app changes
electron:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/apps/**/*.html', 'src/gaia/apps/**/*.js', 'src/gaia/apps/**/*.css']

# Website changes (Astro + Tailwind landing site)
website:
  - changed-files:
    - any-glob-to-any-file: ['website/**/*']

# Dependencies
dependencies:
  - changed-files:
    - any-glob-to-any-file: ['setup.py', 'pyproject.toml', 'requirements*.txt', 'uv.lock', 'package.json', 'package-lock.json']

# Security-sensitive changes
security:
  - changed-files:
    - any-glob-to-any-file: ['docs/sdk/security.md', 'src/gaia/**/security.py', '.github/workflows/test_security.yml']

# Performance-critical changes
performance:
  - changed-files:
    - any-glob-to-any-file: ['src/gaia/llm/**/*', 'src/gaia/rag/**/*', 'src/gaia/eval/**/*']
