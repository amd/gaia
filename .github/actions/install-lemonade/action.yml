name: 'Install Lemonade Server'
description: 'Pins the runner to exactly LEMONADE_VERSION, reconciling via the matching MSI when the installed version differs.'

# This action checks the lemonade-server already installed on the runner
# against the version GAIA expects (``src/gaia/version.LEMONADE_VERSION``).
# If the runner has any version other than the expected one (ahead, behind,
# missing, or unparseable), it reconciles via the matching MSI:
#   1. Uninstall the current copy via the Windows uninstall registry / msiexec
#      (WiX in-place version change returns 1603, so uninstall-first is required).
#   2. Download + silently install the matching MSI from the lemonade-sdk
#      GitHub releases -- the same release URL the gaia init flow uses
#      (``src/gaia/installer/lemonade_installer.py:GITHUB_RELEASE_BASE``).
# Exact-match is then verified; the step fails loud if the version is wrong.
# msiexec is used (not winget) because the runner's service account runs as
# SYSTEM, where winget is unavailable. This keeps the runner's model catalog
# aligned with what GAIA ships to users so preload/pull operations don't 422
# with "model_name not registered".

outputs:
  lemonade-path:
    description: 'Full path to the lemonade-server executable'
    value: ${{ steps.verify.outputs.lemonade_path }}

runs:
  using: 'composite'
  steps:
    - name: Get Expected Lemonade Version
      shell: powershell
      run: |
        # Import directly from version module to avoid triggering gaia/__init__.py
        $lemonadeVersion = python -c "import sys; sys.path.insert(0, 'src/gaia'); from version import LEMONADE_VERSION; print(LEMONADE_VERSION)"
        echo "LEMONADE_VERSION=$lemonadeVersion" >> $env:GITHUB_ENV
        Write-Host "Expected Lemonade version: $lemonadeVersion"

    - name: Verify and (if needed) Reconcile Lemonade Server
      id: verify
      shell: powershell
      run: |
        Write-Host "=== Verifying Lemonade Server ==="

        function Find-LemonadeServer {
            # v10.x renamed the binary to ``LemonadeServer.exe`` (PascalCase)
            # and left ``lemonade-server.exe`` as a deprecation shim that
            # prints "WARNING: 'lemonade-server' is deprecated. Use
            # 'LemonadeServer.exe' to start the server" -- on ``--version``
            # that shim doesn't emit a parseable version. Always prefer the
            # new name; only fall back to the legacy name when the new one
            # is missing.
            $searchPaths = @(
                "${env:ProgramFiles(x86)}\Lemonade Server\bin",
                "$env:ProgramFiles\Lemonade Server\bin",
                "$env:LOCALAPPDATA\Programs\Lemonade Server\bin",
                "$env:LOCALAPPDATA\Programs\Lemonade",
                "$env:ProgramFiles\Lemonade",
                "${env:ProgramFiles(x86)}\Lemonade",
                "$env:USERPROFILE\Lemonade",
                "$env:LOCALAPPDATA\Lemonade",
                "$env:LOCALAPPDATA\lemonade_server\bin",
                "C:\windows\system32\config\systemprofile\AppData\Local\lemonade_server\bin"
            )

            # Pass 1: prefer the new PascalCase exe (v10.x+).
            foreach ($path in $searchPaths) {
                $exePath = Join-Path $path "LemonadeServer.exe"
                if (Test-Path $exePath) {
                    Write-Host "Found LemonadeServer.exe at: $exePath"
                    echo "$path" >> $env:GITHUB_PATH
                    $env:PATH = "$path;$env:PATH"
                    return $exePath
                }
            }

            # Pass 2: fall back to the legacy hyphenated names.
            foreach ($path in $searchPaths) {
                $exePath = Join-Path $path "lemonade-server.exe"
                if (Test-Path $exePath) {
                    Write-Host "Found lemonade-server.exe at: $exePath (legacy)"
                    echo "$path" >> $env:GITHUB_PATH
                    $env:PATH = "$path;$env:PATH"
                    return $exePath
                }
                $batPath = Join-Path $path "lemonade-server.bat"
                if (Test-Path $batPath) {
                    Write-Host "Found lemonade-server.bat at: $batPath (legacy)"
                    echo "$path" >> $env:GITHUB_PATH
                    $env:PATH = "$path;$env:PATH"
                    return $batPath
                }
            }

            # Final fallback: anything ``Get-Command`` can resolve from the
            # current shell's PATH (LemonadeServer first, then lemonade-server).
            foreach ($name in @("LemonadeServer", "lemonade-server")) {
                $cmd = Get-Command $name -ErrorAction SilentlyContinue
                if ($cmd) {
                    Write-Host "Found via Get-Command ($name): $($cmd.Source)"
                    return $cmd.Source
                }
            }

            return $null
        }

        function Refresh-EnvPath {
            # Pull the most-current Path from both HKLM and HKCU. The MSI
            # writes to one or both and the current shell otherwise keeps
            # the pre-install PATH for the rest of the step.
            try {
                $machinePath = [Environment]::GetEnvironmentVariable("Path", "Machine")
            } catch { $machinePath = "" }
            try {
                $userPath = [Environment]::GetEnvironmentVariable("Path", "User")
            } catch { $userPath = "" }
            if ($machinePath -or $userPath) {
                $env:PATH = "$machinePath;$userPath;$env:PATH"
                Write-Host "Refreshed PATH from registry."
            }
        }

        function Get-LemonadeVersion {
            param([string]$LemonadeExe)
            # v10.x renamed the canonical binary to ``LemonadeServer.exe``
            # which appears to be a GUI/launcher shell that emits no
            # console output on ``--version``, while the legacy
            # ``lemonade-server.exe`` is a deprecation shim that prints a
            # warning instead of a version. Reading the PE file's embedded
            # VersionInfo (ProductVersion/FileVersion) avoids both
            # pitfalls -- it's the version the installer baked into the
            # binary, no CLI invocation required.

            # 1) PE file VersionInfo (most reliable; works for .exe).
            if ($LemonadeExe -match "\.exe$") {
                try {
                    $info = (Get-Item -LiteralPath $LemonadeExe -ErrorAction Stop).VersionInfo
                    foreach ($candidate in @($info.ProductVersion, $info.FileVersion)) {
                        if ($candidate -and ($candidate -match "(\d+\.\d+\.\d+)")) {
                            Write-Host "VersionInfo on $LemonadeExe : $candidate"
                            return $matches[1]
                        }
                    }
                } catch {
                    Write-Host "VersionInfo read failed on $LemonadeExe : $_"
                }
            }

            # 2) Fall back to running ``--version``. Combine streams so a
            # v10.x deprecation warning on stderr doesn't trip PowerShell's
            # error-record handling on ``2>&1``. Silence
            # ``$ErrorActionPreference`` so a non-zero exit from a shim
            # doesn't blow us out of the try block.
            $prev = $ErrorActionPreference
            $ErrorActionPreference = "Continue"
            try {
                $versionOutput = & cmd /c "`"$LemonadeExe`" --version 2>&1"
                $combined = ($versionOutput | Out-String)
                if ($combined.Trim()) {
                    Write-Host "--version output from $LemonadeExe :"
                    Write-Host $combined
                }
                $allMatches = [regex]::Matches($combined, "(\d+\.\d+\.\d+)")
                if ($allMatches.Count -gt 0) {
                    return $allMatches[$allMatches.Count - 1].Value
                }
            } catch {
                Write-Host "Exception while querying --version from $LemonadeExe : $_"
            } finally {
                $ErrorActionPreference = $prev
            }
            return $null
        }

        function Compare-SemVer {
            # Returns -1 if A < B, 0 if equal, 1 if A > B. $null on parse failure.
            param([string]$A, [string]$B)
            try {
                $va = [version]$A
                $vb = [version]$B
            } catch {
                return $null
            }
            return $va.CompareTo($vb)
        }

        function Install-LemonadeMsi {
            param([string]$Version)
            $url = "https://github.com/lemonade-sdk/lemonade/releases/download/v$Version/lemonade.msi"
            $dest = Join-Path $env:RUNNER_TEMP "lemonade-$Version.msi"

            Write-Host "Downloading Lemonade Server MSI from: $url"
            try {
                Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing -TimeoutSec 600
            } catch {
                Write-Host "ERROR: MSI download failed: $_"
                throw
            }

            Write-Host "Running silent MSI install (msiexec /i $dest /quiet /norestart)..."
            $msi = Start-Process -FilePath "msiexec.exe" `
                -ArgumentList "/i", $dest, "/quiet", "/norestart", "/L*v", "$env:RUNNER_TEMP\lemonade-msi.log" `
                -PassThru -Wait
            Write-Host "msiexec exit code: $($msi.ExitCode)"
            if ($msi.ExitCode -ne 0) {
                Write-Host "===== MSI install log (tail) ====="
                Get-Content "$env:RUNNER_TEMP\lemonade-msi.log" -Tail 80 -ErrorAction SilentlyContinue
                Write-Host "==================================="
                throw "MSI install failed with exit code $($msi.ExitCode). See log above."
            }
            Write-Host "MSI install completed."
        }

        function Reconcile-LemonadeVersion {
            # Uninstall the current copy (any version) then install exactly $expected
            # via the matching MSI. WiX MSI returns 1603 for in-place version
            # changes, so uninstall-first is mandatory. The registry/msiexec
            # uninstall is SYSTEM-safe; winget is not available to the runner's
            # service account, so it's deliberately not used here.
            param([string]$Expected)

            # SYSTEM-safe uninstall: remove the current/drifted copy via the Windows
            # uninstall registry. Mirrors lemonade_installer.py find_product_code / _uninstall_windows.
            Write-Host "Checking Windows uninstall registry for residual Lemonade entries..."
            $uninstallRoots = @(
                "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall",
                "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall",
                "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall"
            )
            foreach ($root in $uninstallRoots) {
                if (-not (Test-Path $root)) { continue }
                Get-ChildItem $root -ErrorAction SilentlyContinue | ForEach-Object {
                    try {
                        $displayName = (Get-ItemProperty $_.PSPath -ErrorAction SilentlyContinue).DisplayName
                        if ($displayName -and $displayName -match "(?i)lemonade") {
                            $productCode = $_.PSChildName
                            Write-Host "Found residual registry entry: '$displayName' ($productCode) -- removing via msiexec..."
                            $r = Start-Process -FilePath "msiexec.exe" `
                                -ArgumentList "/x", $productCode, "/qn", "/norestart" `
                                -PassThru -Wait -ErrorAction SilentlyContinue
                            if ($r) {
                                Write-Host "msiexec /x exit code: $($r.ExitCode)"
                            }
                        }
                    } catch {
                        # Tolerate individual key read errors.
                    }
                }
            }

            # Install exactly the pinned version via the matching MSI.
            Install-LemonadeMsi -Version $Expected
        }

        # -----------------------------------------------------------------------
        # Main flow
        # -----------------------------------------------------------------------

        $expected = $env:LEMONADE_VERSION

        # Locate (or note absence of) the currently-installed lemonade-server.
        $lemonadePath     = Find-LemonadeServer
        $installedVersion = $null
        if ($lemonadePath) {
            $installedVersion = Get-LemonadeVersion -LemonadeExe $lemonadePath
        } else {
            Write-Host "lemonade-server not found on this runner."
        }

        Write-Host ""
        Write-Host "Installed version: $installedVersion"
        Write-Host "Expected version:  $expected"

        # Single equality rule: exact match → no-op; anything else → reconcile.
        # This catches ahead runners (auto-update drift) as well as behind,
        # missing, or unparseable versions.
        $cmp = if ($installedVersion) { Compare-SemVer $installedVersion $expected } else { $null }
        if ($cmp -eq 0) {
            Write-Host "Runner version matches expected. No reconcile needed."
        } else {
            if ($installedVersion) {
                Write-Host "Runner version ($installedVersion) differs from expected ($expected) -- reconciling to exactly $expected."
            } else {
                Write-Host "No existing install detected -- installing v$expected."
            }

            Reconcile-LemonadeVersion -Expected $expected

            # An MSI version change swaps the server exe but leaves the
            # separately-downloaded llama.cpp backend (the actual ``llama-server``
            # binary) in place. A *downgraded* server then spawns the stale newer
            # backend and the load fails with ``llama-server failed to start``.
            # Wipe the backend so the pinned version re-fetches a matching one.
            #
            # The backend dir is not at a single fixed path across runners: depending
            # on Lemonade version and whether the server runs as SYSTEM it lands under
            # the ``.cache\lemonade`` cache OR alongside the MSI under
            # ``...\AppData\Local\lemonade_server``, as ``.../bin/llamacpp/<backend>/``
            # (lemonade ``path_utils.cpp`` get_downloaded_bin_dir). So search every
            # known root and remove the ``llamacpp`` backend dirs specifically --
            # never the MSI's own LemonadeServer.exe/lemonade.exe, which live directly
            # in ``bin`` (no ``llamacpp`` parent). GGUF weights live in the separate
            # HuggingFace hub cache and are untouched, so only the small backend is
            # re-fetched, never the models. Reconcile-gated: a version-matched runner
            # skips this entirely and pays nothing.
            $searchRoots = @(
                "$env:USERPROFILE\.cache\lemonade",
                "C:\windows\system32\config\systemprofile\.cache\lemonade",
                "$env:LOCALAPPDATA\lemonade_server",
                "C:\windows\system32\config\systemprofile\AppData\Local\lemonade_server"
            )
            if ($env:LEMONADE_CACHE_DIR) { $searchRoots += $env:LEMONADE_CACHE_DIR }
            # Case-insensitive dedup (Windows paths) preserving original casing.
            $seenRoots = @{}
            $roots = foreach ($root in ($searchRoots | Where-Object { $_ })) {
                $rootKey = $root.ToLowerInvariant()
                if ($seenRoots.ContainsKey($rootKey)) { continue }
                $seenRoots[$rootKey] = $true
                if (Test-Path $root) { $root }
            }

            # Log every llama-server binary found (path + size + version) so the real
            # backend layout is visible even when the wipe succeeds -- this is how we
            # confirm a version change actually swapped the backend, not just the exe.
            Write-Host "Reconcile: scanning for llama.cpp backend binaries..."
            foreach ($root in $roots) {
                Get-ChildItem $root -Recurse -File -Filter "llama-server*" -ErrorAction SilentlyContinue |
                    ForEach-Object {
                        $ver = ""
                        try { $ver = (Get-Item -LiteralPath $_.FullName).VersionInfo.ProductVersion } catch {}
                        Write-Host ("   found  {0,12:N0} bytes  ver={1,-12}  {2}" -f $_.Length, $ver, $_.FullName)
                    }
            }

            # Remove only the ``llamacpp`` backend dirs (unambiguously the downloaded
            # backend; never the MSI core binaries).
            $backendDirs = @()
            foreach ($root in $roots) {
                $backendDirs += Get-ChildItem $root -Recurse -Directory -Filter "llamacpp" -ErrorAction SilentlyContinue |
                    Select-Object -ExpandProperty FullName
            }
            $backendDirs = $backendDirs | Sort-Object -Unique
            if (-not $backendDirs) {
                Write-Host "Reconcile: no llamacpp backend dir found under known roots -- the pinned version will fetch a matching backend on first load."
            }
            foreach ($bd in $backendDirs) {
                if (-not (Test-Path $bd)) { continue }
                Write-Host "Reconcile: clearing stale llama.cpp backend at $bd"
                # Fail loud: a swallowed wipe (e.g. a DLL locked by a stray
                # llama-server) would leave the stale backend in place and the next
                # load would fail with the same "llama-server failed to start" --
                # with no signal pointing back here.
                try {
                    Remove-Item $bd -Recurse -Force -ErrorAction Stop
                } catch {
                    Write-Host "ERROR: failed to clear stale backend at $bd : $($_.Exception.Message)"
                    Write-Host "       A stray llama-server may be holding a file lock; the runner needs manual cleanup."
                    exit 1
                }
            }

            # Refresh PATH from registry so the freshly installed binaries
            # in ``Program Files\Lemonade Server\bin`` show up in this shell.
            Refresh-EnvPath

            # Re-locate and re-detect after reconcile.
            $lemonadePath = Find-LemonadeServer
            if (-not $lemonadePath) {
                Write-Host "ERROR: lemonade-server still not found on PATH after reconcile."
                Write-Host "       Run: Get-Command lemonade-server,LemonadeServer -All"
                exit 1
            }
            $installedVersion = Get-LemonadeVersion -LemonadeExe $lemonadePath
            Write-Host ""
            Write-Host "Post-reconcile version: $installedVersion"
        }

        # Drift-prevention pinning can't run from this CI step -- winget is unavailable
        # to the runner's SYSTEM service account; pinning is a runner-ops follow-up.
        # The every-run reconcile is the safety net: a re-drifted runner is reset to
        # the pinned version on the next run, before the pull.

        # Exact-match gate -- fail loud if the version is still wrong after reconcile.
        $finalCmp = Compare-SemVer $installedVersion $expected
        if ($null -eq $finalCmp -or $finalCmp -ne 0) {
            Write-Host "ERROR: Post-reconcile version ($installedVersion) does not match expected ($expected)."
            Write-Host "       Lemonade binaries on PATH:"
            Get-Command lemonade,lemonade-server,LemonadeServer -All -ErrorAction SilentlyContinue | ForEach-Object {
                Write-Host "         - $($_.Source)"
            }
            exit 1
        }

        # Warn if more than one distinct Lemonade binary resolves on PATH (coexistence smell).
        $allBins = Get-Command lemonade,lemonade-server,LemonadeServer -All -ErrorAction SilentlyContinue
        $distinctPaths = $allBins | Select-Object -ExpandProperty Source -Unique
        if (($distinctPaths | Measure-Object).Count -gt 1) {
            Write-Host "WARNING: Multiple Lemonade binaries found on PATH -- coexistence may cause unpredictable behaviour:"
            $distinctPaths | ForEach-Object { Write-Host "  $_" }
        }

        if (-not $lemonadePath) {
            Write-Host "ERROR: lemonade-server not available after verify/reconcile step."
            exit 1
        }

        # Export path for use by other steps
        echo "lemonade_path=$lemonadePath" >> $env:GITHUB_OUTPUT
        echo "LEMONADE_SERVER_PATH=$lemonadePath" >> $env:GITHUB_ENV

        Write-Host ""
        Write-Host "Lemonade Server ready at: $lemonadePath"
        Write-Host "Version: $installedVersion"
