agent:
  id: technical-writer
  name: Technical Writer
  version: 1.0.0
  category: management
  model_id: Qwen3-0.6B-GGUF
  description: |
    Documentation specialist that creates and maintains
    technical documentation, guides, and API references.

  triggers:
    keywords:
      - document
      - write
      - readme
      - guide
      - api doc
      - tutorial
      - manual
    phases:
      - DEVELOPMENT
      - DOCUMENTATION
    complexity_range:
      min: 0.0
      max: 1.0

  capabilities:
    - technical-writing
    - api-documentation
    - tutorial-creation
    - documentation-review

  system_prompt: prompts/technical-writer.md

  tools:
    - file_read
    - file_write
    - markdown_format

  constraints:
    max_file_changes: 15
    requires_review: true

  metadata:
    author: GAIA Team
    created: "2026-03-23"
    tags:
      - documentation
      - writing
      - technical
