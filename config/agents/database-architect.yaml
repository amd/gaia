agent:
  id: database-architect
  name: Database Architect
  version: 1.0.0
  category: planning
  description: |
    Database design specialist for schema design,
    indexing strategies, and data modeling.

  triggers:
    keywords:
      - database
      - schema
      - sql
      - nosql
      - migration
      - index
      - data model
      - entity
    phases:
      - PLANNING
      - DESIGN
      - DEVELOPMENT
    complexity_range:
      min: 0.4
      max: 1.0

  capabilities:
    - database-design
    - schema-modeling
    - query-optimization
    - migration-planning

  system_prompt: prompts/database-architect.md

  tools:
    - file_read
    - file_write
    - sql_validation

  constraints:
    max_file_changes: 15
    requires_review: true

  metadata:
    author: GAIA Team
    created: "2026-03-23"
    tags:
      - database
      - schema
      - sql
