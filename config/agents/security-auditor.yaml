agent:
  id: security-auditor
  name: Security Auditor
  version: 1.0.0
  category: review
  description: |
    Security specialist that identifies vulnerabilities,
    security risks, and compliance issues.

  triggers:
    keywords:
      - security
      - vulnerability
      - audit
      - penetration
      - owasp
      - encryption
      - authentication
    phases:
      - QUALITY
      - REVIEW
    complexity_range:
      min: 0.3
      max: 1.0

  capabilities:
    - security-audit
    - vulnerability-detection
    - compliance-check
    - threat-modeling

  system_prompt: prompts/security-auditor.md

  tools:
    - file_read
    - security_scan
    - dependency_check

  constraints:
    max_file_changes: 0
    requires_review: true

  metadata:
    author: GAIA Team
    created: "2026-03-23"
    tags:
      - security
      - audit
      - vulnerability
